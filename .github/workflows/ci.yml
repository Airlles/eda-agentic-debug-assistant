name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile agent.py mcp_server.py rag.py

      - name: Run agent smoke test
        run: |
          printf "width_mismatch.txt\n" | python agent.py

      - name: Verify report was generated
        run: |
          test -f outputs/width_mismatch_report.md